<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Urban inference{% endblock %} | URBAN-SYNAPSE</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="{{ url_for('main.index') }}" class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-text">URBAN-SYNAPSE</span>
      </a>
      <nav class="nav">
        <a href="{{ url_for('main.index') }}">Run inference</a>
        <a href="{{ url_for('main.training') }}">Previous results</a>
        <a href="{{ url_for('main.about') }}">About</a>
      </nav>
    </div>
  </header>
  <main class="wrap main">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer wrap">
    <p>URBAN-SYNAPSE blends neural segmentation and geospatial OBB detection into a single modern inference workspace.</p>
  </footer>
</body>
</html>
